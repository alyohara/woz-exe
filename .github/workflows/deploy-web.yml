name: Deploy web (pygbag → GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build WASM
        run: >
          python -m pygbag --build --ume_block 0
          --disable-sound-format-error
          --width 1280 --height 800 --CONSOLE 0
          --app_name woz-exe
          --title "WOZ.exe"
          --package org.alyohara.wozexe
          src

      - name: Patch web layout (no scroll / full frame)
        run: python scripts/patch_web_index.py

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
